# SIMD Performance Comparison: zwasm vs wasmtime
# Platform: macOS aarch64 (Apple Silicon)
# zwasm: phase13/simd-jit (ReleaseSafe), wasmtime: v41.0.1
# Methodology: hyperfine --warmup 3 --runs 10 (microbench), --warmup 2 --runs 5 (real-world)

# === SIMD JIT (Phase 13: ARM64 NEON native) ===
# Recorded: 2026-03-23
# Change: SIMD ops JIT-compiled to native NEON instructions (253/256 native)

simd_jit:

  # --- Layer 1: Hand-written WAT microbenchmarks ---

  dot_product:
    description: "f32 dot product, N=4096 elements, 10000 iterations"
    scalar:
      zwasm_ms: 142.3
      wasmtime_ms: 37.4
      ratio: 3.80
    simd:
      zwasm_ms: 190.2
      wasmtime_ms: 15.1
      ratio: 12.59
    zwasm_simd_vs_scalar: 0.75  # SIMD slower (v128.load overhead)

  image_blend:
    description: "128x128 RGBA image blend (50% alpha), 1000 iterations"
    scalar:
      zwasm_ms: 73.5
      wasmtime_ms: 31.1
      ratio: 2.36
    simd:
      zwasm_ms: 15.7
      wasmtime_ms: 12.2
      ratio: 1.29
    zwasm_simd_vs_scalar: 4.68  # SIMD 4.7x faster

  byte_search:
    description: "byte search in 64KB buffer, 1000 iterations, target=42"
    scalar:
      zwasm_ms: 51.8
      wasmtime_ms: 21.7
      ratio: 2.39
    simd:
      zwasm_ms: 43.1
      wasmtime_ms: 5.0
      ratio: 8.62
    zwasm_simd_vs_scalar: 1.20  # SIMD 1.2x faster

  matrix_mul:
    description: "f32 16x16 matrix multiply, 1000 iterations"
    scalar:
      zwasm_ms: 10.1
      wasmtime_ms: 8.3
      ratio: 1.22
    simd:
      zwasm_ms: 6.3
      wasmtime_ms: 7.6
      ratio: 0.83
    zwasm_simd_vs_scalar: 1.60  # SIMD 1.6x faster, BEATS wasmtime!

  microbench_summary:
    simd_wins: "image_blend (4.7x), matrix_mul (1.6x, beats wasmtime), byte_search (1.2x)"
    simd_loses: "dot_product (0.75x, v128.load-heavy loop)"
    best_gap_vs_wasmtime: "matrix_mul 0.83x (zwasm faster!)"
    worst_gap_vs_wasmtime: "dot_product 12.6x"

  # --- Layer 2: Compiler-generated C (-msimd128) real-world ---

  grayscale:
    description: "256x256 RGBA to grayscale, 500 iterations (C, wasm32-wasi-clang -O2 -msimd128)"
    scalar:
      zwasm_ms: 1011
      wasmtime_ms: 7.7
      ratio: 131.3
    simd:
      zwasm_ms: 2413
      wasmtime_ms: 10.2
      ratio: 236.6
    zwasm_simd_vs_scalar: 0.42  # SIMD slower (i16x8.replace_lane heavy)
    note: "wasm_i16x8_make generates 8x replace_lane, very expensive with split v128"

  box_blur:
    description: "256x256 3x3 box blur, 300 iterations (C, wasm32-wasi-clang -O2 -msimd128)"
    scalar:
      zwasm_ms: 1246
      wasmtime_ms: 16.9
      ratio: 73.7
    simd:
      zwasm_ms: 915
      wasmtime_ms: 30.0
      ratio: 30.5
    zwasm_simd_vs_scalar: 1.36  # SIMD 1.4x faster

  sum_reduce:
    description: "f32 array sum N=16384, 10000 iterations (C, wasm32-wasi-clang -O2 -msimd128)"
    scalar:
      zwasm_ms: 1272
      wasmtime_ms: 99.3
      ratio: 12.8
    simd:
      zwasm_ms: 1148
      wasmtime_ms: 99.0
      ratio: 11.6
    zwasm_simd_vs_scalar: 1.11  # SIMD 1.1x faster

  byte_freq:
    description: "64KB byte frequency count, 100 iterations (C, wasm32-wasi-clang -O2 -msimd128)"
    scalar:
      zwasm_ms: 134
      wasmtime_ms: 7.5
      ratio: 17.9
    simd:
      zwasm_ms: 4643
      wasmtime_ms: 6.7
      ratio: 693.0
    zwasm_simd_vs_scalar: 0.03  # SIMD much slower (256 passes x bitmask)
    note: "SIMD algorithm does 256 passes (one per byte value), inherently slower"

  nbody_simd:
    description: "128-body N-body sim, 200 steps (C, wasm32-wasi-clang -O2 -msimd128)"
    scalar:
      zwasm_ms: 401
      wasmtime_ms: 13.5
      ratio: 29.7
    simd:
      zwasm_ms: 503
      wasmtime_ms: 11.2
      ratio: 44.9
    zwasm_simd_vs_scalar: 0.80  # SIMD slightly slower

  realworld_summary:
    simd_wins: "box_blur (1.4x), sum_reduce (1.1x)"
    simd_loses: "grayscale (0.42x), byte_freq (0.03x), nbody (0.80x)"
    scalar_gap_vs_wasmtime: "13-131x (compiler-generated code much harder for JIT)"
    key_bottleneck: "split v128 storage + i16x8.replace_lane patterns from C compiler"

