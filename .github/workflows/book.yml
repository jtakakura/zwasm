name: Book

on:
  push:
    branches: [main]
    paths: ['book/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          curl -L --retry 3 --retry-delay 5 -f -o /tmp/mdbook.tar.gz \
            https://github.com/rust-lang/mdBook/releases/download/v0.5.2/mdbook-v0.5.2-x86_64-unknown-linux-gnu.tar.gz
          tar xzf /tmp/mdbook.tar.gz -C /usr/local/bin

      - name: Build English book
        run: cd book/en && mdbook build

      - name: Build Japanese book
        run: cd book/ja && mdbook build

      - name: Create root redirect
        run: |
          cat > docs/book/index.html << 'REDIRECT'
          <!DOCTYPE html>
          <html>
          <head><meta http-equiv="refresh" content="0;url=en/"></head>
          <body><a href="en/">Redirecting to English...</a></body>
          </html>
          REDIRECT

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
